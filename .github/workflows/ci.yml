name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint backend
        run: python -m ruff check src tests alembic

      - name: Verify backend imports and migrations compile
        run: python -m compileall src tests alembic/versions

      - name: Verify empty database migrations
        run: QE_POSTGRES_URL=sqlite+pysqlite:///./ci-alembic.db alembic upgrade head

      - name: Verify OpenAPI export
        run: QE_POSTGRES_URL=sqlite+pysqlite:///./ci-openapi.db python -m quant_evo_nextgen.runner.export_openapi --output /tmp/evoq-openapi.json

      - name: Run backend tests
        run: python -m pytest -q

      - name: Audit backend dependencies
        run: python -m pip_audit

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard-web/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Audit dashboard production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Build dashboard
        run: npm run build
