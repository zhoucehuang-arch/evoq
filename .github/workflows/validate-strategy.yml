name: Validate Strategy
on:
  pull_request:
    paths: ['workspace/strategies/candidates/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install zipline-reloaded pandas numpy scipy

      - name: Lint strategy code
        run: |
          for f in workspace/strategies/candidates/*.py; do
            [ -f "$f" ] && python -m py_compile "$f"
          done

      - name: Run out-of-sample backtest
        run: |
          echo "TODO: implement backtest runner"
          # python legacy/original-system/scripts/run_backtest.py --strategy-dir workspace/strategies/candidates/ --months 6

      - name: Validate risk parameters
        run: |
          echo "TODO: implement risk validation"
          # python legacy/original-system/scripts/validate_risk.py --config legacy/original-system/config/risk-params.json

      - name: Auto-promote to staging
        if: success()
        run: |
          for f in workspace/strategies/candidates/*.py; do
            [ -f "$f" ] && cp "$f" workspace/strategies/staging/
          done
          git config user.name "quant-evo-bot"
          git config user.email "bot@quant-evo.local"
          git add workspace/strategies/staging/
          git commit -m "ci: promote validated strategies to staging" || true
          git push || true
