name: Feature Request
description: Propose a product, operations, or UX improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Product overview / docs
        - Dashboard UX
        - Discord UX
        - Deployment / operations
        - Research / learning
        - Trading / risk
        - Governance / approvals
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: operator_flow
    attributes:
      label: Operator journey
      description: Describe how the owner or operator would use this feature.
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
  - type: textarea
    id: risks
    attributes:
      label: Risks or tradeoffs
