name: quant-evo-core

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${QE_POSTGRES_DB}
      POSTGRES_USER: ${QE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${QE_POSTGRES_PASSWORD}
    ports:
      - "${QE_POSTGRES_BIND_HOST:-127.0.0.1}:${QE_POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - quant-evo-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QE_POSTGRES_USER} -d ${QE_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  core-api:
    build:
      context: ../../..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ${QE_CORE_RUNTIME_ENV_FILE:-./core.env}
    environment:
      QE_REPO_ROOT: /workspace
    command: uvicorn quant_evo_nextgen.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${QE_API_BIND_HOST:-127.0.0.1}:${QE_API_HOST_PORT:-8000}:8000"
    volumes:
      - ../../..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\""]
      interval: 30s
      timeout: 10s
      retries: 5

  supervisor-runner:
    build:
      context: ../../..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ${QE_CORE_RUNTIME_ENV_FILE:-./core.env}
    environment:
      QE_REPO_ROOT: /workspace
    command: python -m quant_evo_nextgen.runner.supervisor
    volumes:
      - ../../..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      core-api:
        condition: service_healthy

  codex-fabric-runner:
    build:
      context: ../../..
      dockerfile: docker/codex-runner.Dockerfile
    restart: unless-stopped
    env_file:
      - ${QE_CORE_RUNTIME_ENV_FILE:-./core.env}
    environment:
      QE_REPO_ROOT: /workspace
    command: python -m quant_evo_nextgen.runner.codex_fabric
    volumes:
      - ../../..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      core-api:
        condition: service_healthy

  discord-shell:
    build:
      context: ../../..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ${QE_CORE_RUNTIME_ENV_FILE:-./core.env}
    environment:
      QE_REPO_ROOT: /workspace
    command: python -m quant_evo_nextgen.runner.discord_shell
    volumes:
      - ../../..:/workspace
    depends_on:
      core-api:
        condition: service_healthy

  dashboard-web:
    build:
      context: ../../..
      dockerfile: docker/dashboard.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    env_file:
      - ${QE_CORE_RUNTIME_ENV_FILE:-./core.env}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "${QE_DASHBOARD_BIND_HOST:-127.0.0.1}:${QE_DASHBOARD_HOST_PORT:-3000}:3000"
    depends_on:
      core-api:
        condition: service_healthy

volumes:
  quant-evo-postgres:
