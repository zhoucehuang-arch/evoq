name: quant-evo-worker

services:
  codex-fabric-runner:
    build:
      context: ../../..
      dockerfile: docker/codex-runner.Dockerfile
    restart: unless-stopped
    env_file:
      - ${QE_WORKER_RUNTIME_ENV_FILE:-./worker.env}
    environment:
      QE_REPO_ROOT: /workspace
    command: python -m quant_evo_nextgen.runner.codex_fabric
    volumes:
      - ../../..:/workspace
