# Local bootstrap stack only.
# This file is intentionally simpler than the long-term production topology.
x-service-logging: &service-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:17-alpine
    container_name: quant-evo-postgres
    restart: unless-stopped
    mem_limit: ${QE_POSTGRES_MEMORY_LIMIT:-1g}
    cpus: ${QE_POSTGRES_CPUS:-1.0}
    logging: *service-logging
    environment:
      POSTGRES_DB: quant_evo
      POSTGRES_USER: quant_evo
      POSTGRES_PASSWORD: quant_evo
    volumes:
      - quant-evo-postgres:/var/lib/postgresql/data

  core-api:
    build:
      context: .
      dockerfile: ops/docker/backend.Dockerfile
    container_name: quant-evo-core-api
    restart: unless-stopped
    mem_limit: ${QE_CORE_API_MEMORY_LIMIT:-1g}
    cpus: ${QE_CORE_API_CPUS:-1.0}
    logging: *service-logging
    env_file:
      - .env
    environment:
      QE_REPO_ROOT: /workspace
    command: uvicorn quant_evo_nextgen.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      - postgres

  supervisor-runner:
    build:
      context: .
      dockerfile: ops/docker/backend.Dockerfile
    container_name: quant-evo-supervisor-runner
    restart: unless-stopped
    mem_limit: ${QE_SUPERVISOR_MEMORY_LIMIT:-768m}
    cpus: ${QE_SUPERVISOR_CPUS:-0.75}
    logging: *service-logging
    env_file:
      - .env
    environment:
      QE_REPO_ROOT: /workspace
    command: python -m quant_evo_nextgen.runner.supervisor
    volumes:
      - .:/workspace
    depends_on:
      - postgres

  codex-fabric-runner:
    build:
      context: .
      dockerfile: ops/docker/codex-runner.Dockerfile
    container_name: quant-evo-codex-fabric-runner
    restart: unless-stopped
    mem_limit: ${QE_CODEX_FABRIC_MEMORY_LIMIT:-2g}
    cpus: ${QE_CODEX_FABRIC_CPUS:-1.5}
    logging: *service-logging
    env_file:
      - .env
    environment:
      QE_REPO_ROOT: /workspace
    command: python -m quant_evo_nextgen.runner.codex_fabric
    volumes:
      - .:/workspace
    depends_on:
      - postgres

  # Optional light-gateway compatibility shell. The service name stays Discord-specific
  # until the gateway implementation is migrated.
  discord-shell:
    build:
      context: .
      dockerfile: ops/docker/backend.Dockerfile
    container_name: quant-evo-discord-shell
    restart: unless-stopped
    mem_limit: ${QE_DISCORD_SHELL_MEMORY_LIMIT:-512m}
    cpus: ${QE_DISCORD_SHELL_CPUS:-0.5}
    logging: *service-logging
    env_file:
      - .env
    environment:
      QE_REPO_ROOT: /workspace
    command: python -m quant_evo_nextgen.runner.discord_shell
    volumes:
      - .:/workspace
    depends_on:
      - core-api
    profiles:
      - discord

  dashboard-web:
    build:
      context: .
      dockerfile: ops/docker/dashboard.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://core-api:8000
    container_name: quant-evo-dashboard-web
    restart: unless-stopped
    mem_limit: ${QE_DASHBOARD_MEMORY_LIMIT:-1g}
    cpus: ${QE_DASHBOARD_CPUS:-1.0}
    logging: *service-logging
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://core-api:8000
    ports:
      - "3000:3000"
    depends_on:
      - core-api
    profiles:
      - local-dashboard

volumes:
  quant-evo-postgres:
